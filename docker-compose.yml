services:
  postgres:
    image: postgres:16-alpine
    container_name: sim-studio-chat-postgres
    environment:
      POSTGRES_DB: sim_studio_chat
      POSTGRES_USER: sim_chat
      POSTGRES_PASSWORD: sim_chat
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sim_chat -d sim_studio_chat"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
